apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: rollouts-demo
spec:
  replicas: 5
  strategy:
    canary:
      steps:
      - pause: {} # Mulai dengan 0% (semua traffic ke versi lama)
      - setWeight: 10
      - pause: {} # Berhenti di 20% sampai kita klik "Promote" manual
      - setWeight: 30
      - pause: {} # Lanjut otomatis tiap 10 detik
      - setWeight: 50
      - pause: {}
  selector:
    matchLabels:
      app: rollouts-demo
  template:
    metadata:
      labels:
        app: rollouts-demo
    spec:
      containers:
      - name: rollouts-demo
        image: argoproj/rollouts-demo:blue # Versi awal: Biru
        # image: argoproj/rollouts-demo:yellow # Versi baru: Kuning
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: rollouts-demo
spec:
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: rollouts-demo